# Paste this file into the cleariagroup-site repo at: .github/workflows/sync.yml
# It mirrors Projects/cleariagroup-site/ from the clearia-hq vault into the site
# root every 30 minutes (and on demand), then GitHub Pages redeploys.
# Vault = source of truth; the site repo becomes a build artifact.

name: Sync site from vault

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout vault (site folder only)
        uses: actions/checkout@v4
        with:
          repository: cleariagroup/clearia-hq
          token: ${{ secrets.VAULT_TOKEN }}
          path: vault
          sparse-checkout: Projects/cleariagroup-site

      - name: Mirror vault folder into site root
        run: |
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'vault' \
            --exclude 'DEPLOY.md' \
            --exclude 'sync-workflow.yml' \
            vault/Projects/cleariagroup-site/ ./
          rm -rf vault

      - name: Commit and push if changed
        run: |
          git config user.name "clearia-sync"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || { git commit -m "Sync site from vault"; git push; }

